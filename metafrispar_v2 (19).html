function setRelatorioTab(t) {
  relatorioTab = t;
  document.getElementById("relatorio-export-content").innerHTML = renderRelatorioTab(t);
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("active", el.onclick?.toString().includes(`'${t}'`)));
}

function renderRelatorioTab(tab) {
  const meses = Object.keys(relatorioDados).sort();
  if (meses.length === 0) return `<div class="empty"><div class="empty-icon">📊</div><div class="empty-msg">Nenhum dado encontrado nesse período.</div></div>`;

  if (tab === "contaminacao") {
    const linhas = meses.map(mk => {
      const forms = relatorioDados[mk]?.formularios?.contaminacao || {};
      const ents = Object.values(forms);
      const abatidos = ents.reduce((s,v)=>s+(parseInt(v.abatidos)||0),0);
      const analisadas = ents.reduce((s,v)=>s+(parseInt(v.analisadas)||0),0);
      const contaminadas = ents.reduce((s,v)=>s+(parseInt(v.contaminadas)||0),0);
      const pct = analisadas>0 ? (contaminadas/analisadas*100) : null;
      return { periodo: formatMesKey(mk), abatidos, analisadas, contaminadas, pct };
    }).filter(l => l.analisadas > 0);

    return renderTabelaRelatorio(
      "Contaminação de Carcaça",
      ["Período","Animais Abatidos","Carcaças Analisadas","Contaminações Encontradas","% de Contaminação"],
      linhas.map(l => [l.periodo, l.abatidos.toLocaleString('pt-BR'), l.analisadas.toLocaleString('pt-BR'), l.contaminadas.toLocaleString('pt-BR'), l.pct!==null?l.pct.toFixed(2).replace('.',',')+'%':'—']),
      "contaminacao_carcaca"
    );
  }

  if (tab === "carne_cabeca") {
    const linhas = meses.map(mk => {
      const forms = relatorioDados[mk]?.formularios?.carne_cabeca || {};
      const ents = Object.values(forms);
      const animais = ents.reduce((s,v)=>s+(parseInt(v.animais)||0),0);
      const kg = ents.reduce((s,v)=>s+(parseFloat(v.kg)||0),0);
      const media = animais>0 ? (kg/animais) : null;
      return { periodo: formatMesKey(mk), animais, kg, media };
    }).filter(l => l.animais > 0);

    return renderTabelaRelatorio(
      "Carne de Cabeça",
      ["Período","Animais Abatidos","Kg Total","Média kg/animal"],
      linhas.map(l => [l.periodo, l.animais.toLocaleString('pt-BR'), l.kg.toFixed(1).replace('.',',')+' kg', l.media!==null?l.media.toFixed(2).replace('.',',')+' kg':'—']),
      "carne_cabeca"
    );
  }

  if (tab === "miudos") {
    const tipos = [{id:"rumen",label:"Rúmen"},{id:"coracao",label:"Coração"},{id:"lingua",label:"Língua"}];
    return tipos.map(t => {
      const linhas = meses.map(mk => {
        const forms = Object.values(relatorioDados[mk]?.formularios?.miudos || {}).filter(v=>v.tipo===t.id);
        const total = forms.reduce((s,v)=>s+(parseInt(v.qtd_total)||0),0);
        const contam = forms.reduce((s,v)=>s+(parseInt(v.qtd_contam)||0),0);
        const pct = total>0 ? (contam/total*100) : null;
        return { periodo: formatMesKey(mk), total, contam, pct };
      }).filter(l => l.total > 0);
      if (linhas.length === 0) return "";
      return renderTabelaRelatorio(
        "Miúdos — " + t.label,
        ["Período","Total Avaliado","Contaminados","% Contaminação"],
        linhas.map(l => [l.periodo, l.total.toLocaleString('pt-BR'), l.contam.toLocaleString('pt-BR'), l.pct!==null?l.pct.toFixed(2).replace('.',',')+'%':'—']),
        "miudos_"+t.id
      );
    }).join("");
  }

  if (tab === "area_externa") {
    const linhas = meses.map(mk => {
      const forms = Object.values(relatorioDados[mk]?.formularios?.area_externa || {});
      const conformes = forms.filter(v=>v.media>=9.0).length;
      const mediaGeral = forms.length>0 ? (forms.reduce((s,v)=>s+(parseFloat(v.media)||0),0)/forms.length) : null;
      return { periodo: formatMesKey(mk), inspecoes: forms.length, conformes, mediaGeral };
    }).filter(l => l.inspecoes > 0);

    return renderTabelaRelatorio(
      "Área Externa — Inspeções Semanais",
      ["Período","Inspeções Realizadas","Semanas Conformes","Média Geral"],
      linhas.map(l => [l.periodo, l.inspecoes, `${l.conformes}/${l.inspecoes}`, l.mediaGeral!==null?l.mediaGeral.toFixed(1).replace('.',','):'—']),
      "area_externa"
    );
  }
  return "";
}

function renderTabelaRelatorio(titulo, colunas, linhas, exportId) {
  if (linhas.length === 0) return `<div class="alert warn" style="margin-bottom:12px">Sem dados de "${titulo}" no período selecionado.</div>`;
  const tableHtml = `<table id="tbl-${exportId}">
    <thead><tr>${colunas.map(c=>`<th>${c}</th>`).join("")}</tr></thead>
    <tbody>${linhas.map(l=>`<tr>${l.map((v,i)=>`<td class="${i>0?'mono':''}" style="${i===colunas.length-1?'font-weight:700':''}">${v}</td>`).join("")}</tr>`).join("")}</tbody>
  </table>`;

  return `<div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">${titulo}</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-secondary" onclick="exportarCSV('tbl-${exportId}','${exportId}')">⬇ CSV</button>
        <button class="btn btn-sm btn-secondary" onclick="imprimirTabela('${exportId}','${titulo.replace(/'/g,"")}')">🖨 Imprimir</button>
      </div>
    </div>
    <div class="table-wrap">${tableHtml}</div>
  </div>`;
}

function exportarCSV(tableId, filename) {
  const table = document.getElementById(tableId);
  if (!table) return;
  let csv = [];
  table.querySelectorAll("tr").forEach(tr => {
    const row = Array.from(tr.querySelectorAll("th,td")).map(td => `"${td.textContent.trim().replace(/"/g,'""')}"`);
    csv.push(row.join(";"));
  });
  const blob = new Blob(["\uFEFF" + csv.join("\n")], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${filename}_${todayStr()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("CSV baixado ✓");
}

function imprimirTabela(tableId, titulo) {
  const table = document.getElementById("tbl-"+tableId);
  if (!table) return;
  const win = window.open("", "_blank");
  win.document.write(`<html><head><title>${titulo}</title><style>
    body{font-family:Arial,sans-serif;padding:24px;color:#111}
    h1{font-size:18px;margin-bottom:16px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px 12px;text-align:left;border-bottom:1px solid #ccc;font-size:13px}
    th{background:#f3f3f3;font-weight:700}
  </style></head><body><h1>${titulo} — META+FRISPAR</h1>${table.outerHTML}</body></html>`);
  win.document.close();
  win.print();
}

function carregarRelatorio() {
  relatorioCarregando = true;
  relatorioDados = {};
  const hoje = new Date();
  const chaves = [];
  for (let i = 0; i < relatorioQtdMeses; i++) {
    const d = new Date(hoje.getFullYear(), hoje.getMonth() - i, 1);
    chaves.push(getMesKey(d.getFullYear(), d.getMonth()));
  }
  let pendentes = chaves.length;
  chaves.forEach(mk => {
    db.ref(`metafrispar/meses/${mk}`).once("value", snap => {
      const val = snap.val();
      if (val) relatorioDados[mk] = val;
      pendentes--;
      if (pendentes === 0) {
        relatorioCarregando = false;
        if (currentPage === "relatorios_export") renderPage();
      }
    });
  });
}

// ─── BACKUP DE DADOS ────────────────────────────────────────────────────────────
function renderBackup() {
  return `<div>
    <div class="alert info" style="margin-bottom:14px">
      O backup baixa uma cópia completa de tudo (metas, formulários, usuários, log) em um arquivo no seu computador ou celular. Guarde em local seguro — Google Drive, e-mail para você mesma, etc.
    </div>

    <div class="card">
      <div class="card-title">Baixar backup completo</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">Gera um arquivo .json com todos os dados do sistema até agora.</div>
      <button class="btn btn-primary btn-full" onclick="fazerBackupCompleto()">⬇ Baixar backup agora</button>
      <div id="backup-status" style="margin-top:10px"></div>
    </div>

    <div class="card" style="border-color:var(--yellow)">
      <div class="card-title" style="color:var(--yellow)">⚠ Restaurar backup</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:14px">
        Restaurar <strong>substitui todos os dados atuais</strong> pelos dados do arquivo de backup. Use somente se algo der muito errado e você precisar voltar a um estado anterior salvo. Esta ação não pode ser desfeita.
      </div>
      <input type="file" id="backup-file-input" accept=".json" style="display:none" onchange="confirmarRestauraBackup(this)">
      <button class="btn btn-danger btn-full" onclick="document.getElementById('backup-file-input').click()">📤 Selecionar arquivo de backup para restaurar</button>
    </div>

    <div class="card">
      <div class="card-title">Recomendação</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">
        Faça backup pelo menos 1x por mês — especialmente antes de fechar a apuração de bônus, e sempre que fizer mudanças grandes (dividir equipes, criar formulários novos). Salve o arquivo com data no nome, tipo "backup_2026-06-30.json".
      </div>
    </div>
  </div>`;
}

function fazerBackupCompleto() {
  const statusEl = document.getElementById("backup-status");
  statusEl.innerHTML = `<div class="alert info">Coletando todos os dados, aguarde...</div>`;
  db.ref("metafrispar").once("value", snap => {
    const dados = snap.val() || {};
    const backup = {
      gerado_em: new Date().toISOString(),
      gerado_por: currentUser.nome,
      versao_sistema: "META+FRISPAR v2",
      dados
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dataStr = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `backup_metafrispar_${dataStr}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    logAction("Backup gerado", `Por ${currentUser.nome}`);
    statusEl.innerHTML = `<div class="alert success">✓ Backup baixado com sucesso. Guarde esse arquivo em local seguro.</div>`;
    toast("Backup baixado ✓");
  }, err => {
    statusEl.innerHTML = `<div class="alert error">Erro ao gerar backup: ${err.message}</div>`;
  });
}

function confirmarRestauraBackup(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    let parsed;
    try { parsed = JSON.parse(e.target.result); }
    catch(err) { toast("Arquivo inválido — não é um backup válido","err"); input.value=""; return; }

    if (!parsed.dados) { toast("Arquivo não parece ser um backup do sistema","err"); input.value=""; return; }

    const dataGeracao = parsed.gerado_em ? new Date(parsed.gerado_em).toLocaleString("pt-BR") : "data desconhecida";
    const confirmacao = confirm(
      `ATENÇÃO: Isso vai APAGAR todos os dados atuais e substituir pelo backup de ${dataGeracao} (gerado por ${parsed.gerado_por||'desconhecido'}).\n\nEssa ação NÃO pode ser desfeita.\n\nTem certeza que quer continuar?`
    );
    if (!confirmacao) { input.value=""; return; }

    const confirmacao2 = prompt(`Para confirmar, digite RESTAURAR (em maiúsculas):`);
    if (confirmacao2 !== "RESTAURAR") { toast("Restauração cancelada"); input.value=""; return; }

    db.ref("metafrispar").set(parsed.dados).then(() => {
      logAction("Backup restaurado", `De ${dataGeracao}`);
      toast("Backup restaurado ✓ Recarregando...");
      setTimeout(() => location.reload(), 1500);
    }).catch(err => {
      toast("Erro ao restaurar: "+err.message, "err");
    });
  };
  reader.readAsText(file);
}

let metaLinhaCount = 1;
function adicionarLinhaMetaEstrutura() {
  const cont = document.getElementById("ne-metas-container");
  if (!cont) return;
  const div = document.createElement("div");
  div.innerHTML = renderLinhaMetaEstrutura(metaLinhaCount++);
  cont.appendChild(div.firstElementChild);

function salvarNovaEquipe() {
  const id = document.getElementById("ne-id").value.trim().toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
  const label = document.getElementById("ne-label").value.trim();
  const cor = document.getElementById("ne-cor").value;
  if (!id || !label) { toast("Informe nome e ID da equipe","err"); return; }

  const metas = [];
  document.querySelectorAll("#ne-metas-container .entry-block").forEach(bloco => {
    const lbl = bloco.querySelector(".ne-meta-label")?.value.trim();
    const tipo = bloco.querySelector(".ne-meta-tipo")?.value;
    const meta = parseFloat(bloco.querySelector(".ne-meta-valor")?.value)||0;
    const unidade = bloco.querySelector(".ne-meta-unidade")?.value||"%";
    const bonus = parseFloat(bloco.querySelector(".ne-meta-bonus")?.value)||0;
    const obs = bloco.querySelector(".ne-meta-obs")?.value||"";
    const membros = Array.from(bloco.querySelectorAll(".ne-meta-membro-chk:checked")).map(c=>c.value);
    if (lbl) metas.push({ id: lbl.toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"").slice(0,20), label:lbl, tipo, meta, unidade, bonus, obs, membros });
  });

  db.ref(`metafrispar/config/equipes/${id}`).set({ label, cor, metas, ativo:true, criado_por:currentUser.nome, ts:Date.now() }).then(() => {
    logAction("Criou equipe", `${label} (${id}) com ${metas.length} metas`);
    toast(`Equipe "${label}" criada ✓`);
    carregarEquipesDinamicas(() => setConfigTab("estrutura"));
  });
}

function excluirMetaEquipe(equipeId, metaIdx) {
  const eq = equipesDinamicas[equipeId];
  if (!eq) return;
  if (!confirm(`Excluir a meta "${eq.metas[metaIdx]?.label}"?`)) return;

// IA monta o formulário: chama a API da Anthropic, pede JSON estruturado, preenche os campos manuais
function gerarFormularioIA() {
  const desc = document.getElementById("ia-form-desc").value.trim();
  const statusEl = document.getElementById("ia-form-status");
  if (!desc) { statusEl.innerHTML = `<div class="alert error">Descreva o que você precisa controlar primeiro.</div>`; return; }

  statusEl.innerHTML = `<div class="alert info">✨ Montando os campos...</div>`;

  // Monta o formulário a partir do texto, sem depender de servidor externo (funciona 100% offline)
  setTimeout(() => {
    const parsed = interpretarDescricaoFormulario(desc);

    document.getElementById("nf-label").value = parsed.label || "";
    document.getElementById("nf-id").value = parsed.id || "";
    document.getElementById("nf-resp").value = parsed.responsavel || "";
    document.getElementById("nf-freq").value = parsed.frequencia || "diario";

    document.getElementById("nf-campos-container").innerHTML = "";
    campoLinhaCount = 0;
    (parsed.campos || []).forEach(c => {
      const cont = document.getElementById("nf-campos-container");
      const div = document.createElement("div");
      div.innerHTML = renderLinhaCampoForm(campoLinhaCount++, c);
      cont.appendChild(div.firstElementChild);
    });
    document.querySelectorAll("#nf-campos-container .nf-campo-tipo").forEach(sel => {
      const wrap = sel.closest(".entry-block").querySelector(".nf-opcoes-wrap");
      if (wrap) wrap.style.display = sel.value === "selecao" ? "block" : "none";
      sel.onchange = () => { if (wrap) wrap.style.display = sel.value === "selecao" ? "block" : "none"; };
    });

    statusEl.innerHTML = `<div class="alert success">✓ Rascunho pronto! Revise os campos abaixo, ajuste o que precisar e clique em "Criar formulário".</div>`;
    document.getElementById("nf-label").scrollIntoView({behavior:"smooth", block:"center"});
  }, 400);
}

// Interpreta a descrição em português e monta os campos do formulário por palavras-chave.
// Não depende de internet/API — roda inteiramente no navegador.
function interpretarDescricaoFormulario(desc) {
  const txt = desc.toLowerCase();
  const campos = [];

  // Nome do formulário: tenta extrair o assunto principal (depois de "controlar"/"controle de")
  let label = desc.trim();
  const matchControlar = desc.match(/controla?r?\s+(?:o\s+|a\s+)?(.+?)(?:,|\.|$| que | com )/i);
  if (matchControlar) label = "Controle de " + matchControlar[1].trim();
  label = label.charAt(0).toUpperCase() + label.slice(1);
  if (label.length > 60) label = label.slice(0, 60);

  const id = label.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // remove acentos
    .replace(/[^a-z0-9\s]/g, "").trim()
    .split(/\s+/).slice(0, 4).join("_");

  // Responsável: procura nome próprio comum mencionado
  let responsavel = "";
  const nomesConhecidos = ["tiago","luiz","lucas","marcelo","julia","júlia"];
  for (const nome of nomesConhecidos) {
    if (txt.includes(nome)) { responsavel = nome.charAt(0).toUpperCase()+nome.slice(1); break; }
  }

  // Frequência
  let frequencia = "diario";
  if (txt.includes("semanal") || txt.includes("por semana") || txt.includes("toda semana")) frequencia = "semanal";
  else if (txt.includes("mensal") || txt.includes("por mês") || txt.includes("todo mês")) frequencia = "mensal";

  // Campos por palavra-chave
  if (/peso|kg|quilo/.test(txt)) campos.push({ label:"Peso (kg)", tipo:"numero" });
  if (/quantidade|qtd|número de|n[uú]mero de|unidades/.test(txt)) campos.push({ label:"Quantidade", tipo:"numero" });
  if (/percentual|porcentagem|%/.test(txt)) campos.push({ label:"Percentual", tipo:"pct" });
  if (/aprovad|rejeitad|conforme|n[aã]o conforme/.test(txt)) campos.push({ label:"Status", tipo:"selecao", opcoes:["Aprovado","Rejeitado"] });
  if (/contamina/.test(txt)) campos.push({ label:"Houve contaminação?", tipo:"sim_nao" });
  if (/origem|motivo|causa/.test(txt)) campos.push({ label:"Origem/Motivo", tipo:"selecao", opcoes:["Fecal","Ruminal","Pelos/couro","Outros"] });
  if (/observa[cç][aã]o|coment[aá]rio|obs\b/.test(txt)) campos.push({ label:"Observação", tipo:"observacao" });
  if (/temperatura/.test(txt)) campos.push({ label:"Temperatura (°C)", tipo:"numero" });
  if (/valor|preço|custo|r\$/.test(txt)) campos.push({ label:"Valor (R$)", tipo:"numero" });
  if (/nota|avalia[cç][aã]o/.test(txt)) campos.push({ label:"Nota (0-10)", tipo:"numero" });

  // Se nada foi detectado, monta um genérico com campo de quantidade + observação
  if (campos.length === 0) {
    campos.push({ label:"Resultado", tipo:"numero" });
    campos.push({ label:"Observação", tipo:"observacao" });
  }

  return { label, id, responsavel, frequencia, campos: campos.slice(0,6) };
}

function salvarNovoFormulario() {
  const id = document.getElementById("nf-id").value.trim().toLowerCase().replace(/\s+/g,"_").replace(/[^a-z0-9_]/g,"");
  const label = document.getElementById("nf-label").value.trim();
  const resp = document.getElementById("nf-resp").value.trim();
  const freq = document.getElementById("nf-freq").value;
  if (!id || !label) { toast("Informe nome e ID","err"); return; }

  const campos = [];
  document.querySelectorAll("#nf-campos-container .entry-block").forEach((bloco,i) => {
    const lbl = bloco.querySelector(".nf-campo-label")?.value.trim();
    const tipo = bloco.querySelector(".nf-campo-tipo")?.value;
    const opcStr = bloco.querySelector(".nf-campo-opcoes")?.value||"";
    const opcoes = tipo==="selecao" ? opcStr.split(",").map(s=>s.trim()).filter(Boolean) : [];
    if (lbl) campos.push({ id:`campo_${i}`, label:lbl, tipo, ...(opcoes.length?{opcoes}:{}) });
  });

  db.ref(`metafrispar/config/formularios/${id}`).set({ label, responsavel:resp, frequencia:freq, campos, ativo:true, criado_por:currentUser.nome, ts:Date.now() }).then(() => {
    logAction("Criou formulário", `${label} (${id}) com ${campos.length} campos`);
    toast(`Formulário "${label}" criado ✓`);
    carregarFormulariosDinamicos(() => setConfigTab("form_builder"));
  });
}

    { id:"desossa_dev_meta",     label:"Devoluções internas (Desossa)",       unidade:"%",         tipo:"max", valor:c.desossa_dev_meta },
    { id:"expedicao_dev_meta",   label:"Devoluções internas (Expedição)",     unidade:"%",         tipo:"max", valor:c.expedicao_dev_meta },
  ];

  return `<div>
    <div class="alert info" style="margin-bottom:14px">Tipo "máx" = meta é não ultrapassar. Tipo "mín" = meta é atingir ou superar.</div>
    <div class="card">
      <div class="card-title">Metas de Produção</div>
      ${campos.map(f=>`<div style="display:grid;grid-template-columns:1fr 100px 50px;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
        <div>
          <div style="font-size:14px;color:var(--text2)">${f.label}</div>
          <div style="font-size:11px;color:var(--text3)">${f.tipo==='max'?'Máximo permitido':'Mínimo necessário'} · ${f.unidade}</div>
        </div>
        <input class="form-input cfg-campo" data-id="${f.id}" type="number" step="0.1" min="0" value="${f.valor}" style="padding:9px 10px;text-align:center">
        <span style="font-size:12px;color:var(--text3)">${f.unidade}</span>
      </div>`).join("")}
    </div>
    <button class="btn btn-primary btn-full" onclick="salvarConfig('producao')">Salvar metas de produção</button>
  </div>`;
}

function renderConfigBonus(c) {
  const campos = [
    { grupo:"Bônus Produção (máx R$300)", itens:[
      { id:"bonus_prod_max",        label:"Bônus máximo total",    valor:c.bonus_prod_max },
      { id:"bonus_prod_empresa",    label:"Meta Empresa (20%)",    valor:c.bonus_prod_empresa },
      { id:"bonus_prod_equipe",     label:"Meta Equipe (40%)",     valor:c.bonus_prod_equipe },
      { id:"bonus_prod_individual", label:"Meta Individual (40%)", valor:c.bonus_prod_individual },
    ]},
    { grupo:"Bônus Administrativo (máx R$450)", itens:[
      { id:"bonus_adm_max",         label:"Bônus máximo total",    valor:c.bonus_adm_max },
      { id:"bonus_adm_empresa",     label:"Pilar Empresa (DRE)",   valor:c.bonus_adm_empresa },
      { id:"bonus_adm_setor",       label:"Pilar Setor (KPIs)",    valor:c.bonus_adm_setor },
      { id:"bonus_adm_assiduidade", label:"Pilar Assiduidade",     valor:c.bonus_adm_assiduidade },
    ]},
  ];

  return `<div>
    ${campos.map(g=>`<div class="card">
      <div class="card-title">${g.grupo}</div>
      ${g.itens.map(f=>`<div style="display:grid;grid-template-columns:1fr 110px;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)">
        <div style="font-size:14px;color:var(--text2)">${f.label}</div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:13px;color:var(--text3)">R$</span>
          <input class="form-input cfg-campo" data-id="${f.id}" type="number" step="0.01" min="0" value="${f.valor}" style="padding:9px 8px;text-align:right">
        </div>
      </div>`).join("")}
    </div>`).join("")}
    <button class="btn btn-primary btn-full" onclick="salvarConfig('bonus')">Salvar valores do bônus</button>
  </div>`;
}

function salvarConfig(tipo) {
  const campos = document.querySelectorAll(".cfg-campo");
  const updates = {};
  campos.forEach(el => {
    const id = el.dataset.id;
    const val = parseFloat(el.value);
    if (!isNaN(val) && id) updates[id] = val;
  });
  if (Object.keys(updates).length === 0) { toast("Nenhum campo encontrado","err"); return; }
  db.ref("metafrispar/config/metas").update(updates).then(() => {
    configMetas = { ...configMetas, ...updates };
    logAction("Config atualizada", `${tipo}: ${Object.keys(updates).length} campos`);
    toast("Configuração salva ✓");
  });
}

// ─── SAVE FUNCTIONS ───────────────────────────────────────────────────────────
// Gerencia o listener "ao vivo" do mês atual — sempre desliga o anterior antes de trocar.
// Sem isso, ao navegar entre meses o listener antigo sobrescreve os dados do mês novo.
let mesAtualRef = null;
const PAGINAS_REATIVAS_MES = ["dashboard","lancamento","administrativo","formularios","meu_lancamento"];

function trocarListenerMes(mesKey) {
  if (mesAtualRef) mesAtualRef.off(); // desliga o listener do mês anterior
  mesAtualRef = db.ref(`metafrispar/meses/${mesKey}`);
  mesAtualRef.on("value", snap => {
    dadosMes = snap.val() || {};
    if (PAGINAS_REATIVAS_MES.includes(currentPage)) renderPage();
  });
}

function navMes(dir) {
  let m = currentMes.mes + dir, a = currentMes.ano;
  if (m<0){m=11;a--;} if(m>11){m=0;a++;}
  currentMes = {ano:a, mes:m};
  trocarListenerMes(getMesKey(a,m));
}

function salvarEmpresa(mesKey) {
  const dias = document.getElementById("emp-dias").value;
  const animais = document.getElementById("emp-animais").value;
  const data = { dias_uteis: parseInt(dias)||0, animais_abatidos: parseInt(animais)||0, atualizado_por: currentUser.nome, ts: Date.now() };
  db.ref(`metafrispar/meses/${mesKey}/empresa`).update(data).then(()=>{
    logAction("Lançamento empresa", `Dias: ${dias}, Animais: ${animais}`);
    toast("Dados gerais salvos ✓");
  });
}

function salvarAbate(mesKey) {
  const c = document.getElementById("abate-contam").value;
  const d = document.getElementById("abate-couro").value;
  const obs = document.getElementById("abate-obs").value;
  const data = { pct_contaminacao: parseFloat(c)||0, pct_couro: parseFloat(d)||0, obs, atualizado_por: currentUser.nome, ts: Date.now() };
  db.ref(`metafrispar/meses/${mesKey}/equipes/abate`).set(data).then(()=>{
    logAction("Lançamento Abate", `Contaminação: ${c}%, Couro: ${d}%`);
    toast("Abate salvo ✓");
    setLancTab("abate");
  });
}

function salvarMiudos(mesKey) {
  const coracao = document.getElementById("miudos-coracao").value;
  const lingua = document.getElementById("miudos-lingua").value;
  const rumen = document.getElementById("miudos-rumen").value;
  const cabeca = document.getElementById("miudos-cabeca").value;
  const obs = document.getElementById("miudos-obs").value;
  const data = { coracao, lingua, pct_rumen: parseFloat(rumen)||null, media_cabeca: parseFloat(cabeca)||null, obs, atualizado_por: currentUser.nome, ts: Date.now() };
  db.ref(`metafrispar/meses/${mesKey}/equipes/miudos`).set(data).then(()=>{
    logAction("Lançamento Miúdos", `Rúmens: ${rumen}%, Cabeça: ${cabeca}kg`);
    toast("Miúdos salvo ✓");
    setLancTab("miudos");
  });
}

function salvarAreaExterna(mesKey) {
  const semanas = [0,1,2,3].map(i => ({
    data: document.getElementById(`ae-data-${i}`)?.value||"",
    media: parseFloat(document.getElementById(`ae-media-${i}`)?.value)||null,
    conforme: document.getElementById(`ae-conf-${i}`)?.value||""
  }));
  db.ref(`metafrispar/meses/${mesKey}/equipes/area_externa`).set({ semanas, atualizado_por: currentUser.nome, ts: Date.now() }).then(()=>{
    logAction("Lançamento Área Externa", "Semanas atualizadas");
    toast("Área Externa salva ✓");
    setLancTab("area_externa");
  });
}

function salvarDesossa(mesKey) {
  const internas = document.getElementById("des-internas")?.value;
  const total = document.getElementById("des-total")?.value;
  const obs = document.getElementById("des-obs")?.value||"";
  const data = { dev_internas: parseInt(internas)||0, dev_total: parseInt(total)||0, obs, atualizado_por: currentUser.nome, ts: Date.now() };
  db.ref(`metafrispar/meses/${mesKey}/equipes/desossa`).set(data).then(()=>{
    logAction("Lançamento Desossa", `Internas: ${internas}, Total: ${total}`);
    toast("Desossa salva ✓");
    if (currentPage === "lancamento") setLancTab("desossa");
    else renderPage();
  });
}

function salvarExpedicao(mesKey) {
  const internas = document.getElementById("exp-internas").value;
  const total = document.getElementById("exp-total").value;
  const obs = document.getElementById("exp-obs").value;
  const data = { dev_internas: parseInt(internas)||0, dev_total: parseInt(total)||0, obs, atualizado_por: currentUser.nome, ts: Date.now() };
  db.ref(`metafrispar/meses/${mesKey}/equipes/expedicao`).set(data).then(()=>{
    logAction("Lançamento Expedição", `Internas: ${internas}, Total: ${total}`);
    toast("Expedição salva ✓");
    setLancTab("expedicao");
  });
}

function salvarIndividual(mesKey) {
  const inputs = document.querySelectorAll("[data-colab]");
  const dados = {};
  inputs.forEach(el => {
    const id = el.dataset.colab; const campo = el.dataset.campo;
    if (!dados[id]) dados[id] = {};
    dados[id][campo] = parseInt(el.value)||0;
  });
  Object.entries(dados).forEach(([id,d]) => {
    db.ref(`metafrispar/meses/${mesKey}/individual/${id}`).update({ ...d, ts: Date.now() });
  });
  logAction("Lançamento Individual", "Ocorrências atualizadas");
  toast("Individual salvo ✓");
}

// (funções de lote substituem as antigas de registro único — ver salvarLoteContaminacao, salvarLoteMiudos, salvarLoteCarneCabeca)

function salvarFormAreaExterna(mesKey) {
  const dataInsp = document.getElementById("ae-f-data").value;
  const semana = document.getElementById("ae-f-semana").value;
  const avaliador = document.getElementById("ae-f-avaliador").value.trim();
  const notaEls = document.querySelectorAll(".ae-nota");
  const notas = Array.from(notaEls).map(el => el.value !== "" ? parseFloat(el.value) : null);
  const obsItemEls = document.querySelectorAll(".ae-obs-item");
  const obs_itens = Array.from(obsItemEls).map(el => el.value.trim());
  const obs = document.getElementById("ae-f-obs").value;
  const validas = notas.filter(n => n !== null);
  if (!dataInsp) { toast("Informe a data da inspeção","err"); return; }
  if (validas.length === 0) { toast("Preencha pelo menos um item","err"); return; }
  const media = validas.reduce((s,n)=>s+n,0)/validas.length;
  db.ref(`metafrispar/meses/${mesKey}/formularios/area_externa`).push({
    data: dataInsp, semana: parseInt(semana), avaliador, notas, obs_itens,
    media: parseFloat(media.toFixed(2)), obs, usuario: currentUser.id, usuario_nome: currentUser.nome, ts: Date.now()
  }).then(()=>{
    logAction("Form: Área Externa", `Semana ${semana} — média ${media.toFixed(1)}`);
    toast("Inspeção salva ✓");
    renderPage();
  });
}

function delEntry(mesKey, path, key) {
  if (!confirm("Excluir este registro?")) return;
  db.ref(`metafrispar/meses/${mesKey}/${path}/${key}`).remove().then(()=>{
    logAction("Exclusão", `${path} — ${key}`);
    toast("Registro excluído");
    renderPage();
  });
}

// Colaboradores
function salvarNovoColab() {
  const nome = document.getElementById("nc-nome").value.trim();
  const equipe = document.getElementById("nc-equipe").value;
  const dataEntrada = document.getElementById("nc-data").value;
  if (!nome) { toast("Informe o nome","err"); return; }
  const id = nome.toLowerCase().replace(/\s+/g,".").replace(/[^a-z0-9.]/g,"") + "_" + Date.now();
  db.ref(`metafrispar/colaboradores/${id}`).set({ id, nome, equipe, dataEntrada, ativo: true, ts: Date.now() }).then(()=>{
    logAction("Cadastro colaborador", nome);
    toast("Colaborador cadastrado ✓");
    setEquipesTab("listar");
  });
}

function editarColab(id) {
  editColab = id;
  equipesTab = "adicionar";
  const equipes = ["Linha de Abate","Miúdos","Área Externa","Desossa","Expedição","Escritório","Manutenção","Compra de Gado","Outros"];
  document.getElementById("equipes-content").innerHTML = renderFormNovoColab(equipes);
  document.querySelectorAll(".tab").forEach(el => el.classList.toggle("active", el.onclick?.toString().includes("'adicionar'")));
  attachEvents();
}

function salvarEditColab(id) {
  const nome = document.getElementById("nc-nome").value.trim();
  const equipe = document.getElementById("nc-equipe").value;
  const dataEntrada = document.getElementById("nc-data").value;
  if (!nome) { toast("Informe o nome","err"); return; }
  db.ref(`metafrispar/colaboradores/${id}`).update({ nome, equipe, dataEntrada }).then(()=>{
    logAction("Edição colaborador", nome);
    editColab = null;
    toast("Colaborador atualizado ✓");
    setEquipesTab("listar");
  });
}

function cancelEditColab() {
  editColab = null;
  setEquipesTab("listar");
}

function toggleColab(id, ativar) {
  db.ref(`metafrispar/colaboradores/${id}`).update({ ativo: ativar }).then(()=>{
    logAction(ativar?"Ativou colaborador":"Desativou colaborador", id);
    toast(ativar?"Colaborador ativado":"Colaborador desativado");
  });
}

// Usuários
function salvarNovoUsuario() {
  const id = document.getElementById("nu-id").value.trim().toLowerCase().replace(/\s/g,"");
  const nome = document.getElementById("nu-nome").value.trim();
  const senha = document.getElementById("nu-senha").value;
  const perfil = document.getElementById("nu-perfil").value;
  const acesso = Array.from(document.querySelectorAll("[id^='ac-']:checked")).map(el=>el.value);
  if (!id||!nome||!senha) { toast("Preencha todos os campos","err"); return; }
  db.ref(`metafrispar/usuarios/${id}`).set({ nome, senha, perfil, acesso, ativo: true, criado_por: currentUser.id, ts: Date.now() }).then(()=>{
    logAction("Criou usuário", `@${id} — ${PERFIL_LABELS[perfil]}`);
    toast("Usuário criado ✓");
    setUsuariosTab("listar");
  });
}

function editarUsuario(id) {
  const allUsers = { ...DEFAULT_USERS, ...usuariosDB };
  const u = allUsers[id];
  if (!u) return;

  // Monta modal de edição
  let modal = document.getElementById("modal-usuario");
  if (!modal) { modal = document.createElement("div"); modal.id="modal-usuario"; document.body.appendChild(modal); }
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)fecharModalUsuario()">
      <div class="modal">
        <div class="modal-handle"></div>
        <div class="modal-title">Editar usuário — ${u.nome}</div>

        <div class="alert info" style="margin-bottom:16px">Login: <strong>@${id}</strong></div>

        <div class="form-group">
          <label class="form-label">Nova senha <span class="obs">(deixe vazio para não alterar)</span></label>
          <input class="form-input" type="password" id="eu-senha" placeholder="Nova senha">
        </div>
        <div class="form-group">
          <label class="form-label">Forçar troca na próxima entrada?</label>
          <select class="form-input" id="eu-provisoria">
            <option value="sim" ${u.senha_provisoria?"selected":""}>Sim — senha provisória (trocar no próximo login)</option>
            <option value="nao" ${!u.senha_provisoria?"selected":""}>Não — senha permanente</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Perfil</label>
          <select class="form-input" id="eu-perfil">
            <option value="operador" ${u.perfil==="operador"?"selected":""}>Operador</option>
            <option value="gerente" ${u.perfil==="gerente"?"selected":""}>Gerente</option>
            <option value="admin" ${u.perfil==="admin"?"selected":""}>Administrador</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Formulários com acesso</label>
          ${Object.entries(ACESSO_LABELS).map(([k,v])=>`<div class="checkbox-row">
            <input type="checkbox" id="eu-ac-${k}" value="${k}" ${(u.acesso||[]).includes(k)?'checked':''}>
            <label for="eu-ac-${k}">${v}</label>
          </div>`).join("")}
        </div>

        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="fecharModalUsuario()">Cancelar</button>
          <button class="btn btn-primary" onclick="salvarEdicaoUsuario('${id}')">Salvar</button>
        </div>
      </div>
    </div>`;
}

function fecharModalUsuario() {
  const m = document.getElementById("modal-usuario");
  if (m) m.innerHTML = "";
}

function salvarEdicaoUsuario(id) {
  const novaSenha = document.getElementById("eu-senha").value.trim();
  const provisoria = document.getElementById("eu-provisoria").value === "sim";
  const perfil = document.getElementById("eu-perfil").value;
  const acesso = Array.from(document.querySelectorAll("[id^='eu-ac-']:checked")).map(el=>el.value);

  const updates = { perfil, acesso, senha_provisoria: provisoria };
  if (novaSenha.length >= 4) {
    updates.senha = novaSenha;
  } else if (novaSenha.length > 0 && novaSenha.length < 4) {
    toast("Senha deve ter pelo menos 4 caracteres","err"); return;
  }

  db.ref(`metafrispar/usuarios/${id}`).update(updates).then(() => {
    logAction("reset_senha", `Senha redefinida para @${id} pelo admin`);
    logAction("Editou usuário", `@${id} — perfil: ${perfil}, acesso: ${acesso.join(", ")||"nenhum"}`);
    fecharModalUsuario();
    toast("Usuário atualizado ✓");
  });
}

function toggleUsuario(id, desativar) {
  db.ref(`metafrispar/usuarios/${id}`).update({ ativo: !desativar }).then(()=>{
    logAction(desativar?"Desativou usuário":"Ativou usuário", `@${id}`);
    toast(desativar?"Usuário desativado":"Usuário ativado");
  });
}

// ─── ATTACH EVENTS ────────────────────────────────────────────────────────────
function attachEvents() {
  // Tab switching for lancamento
  document.querySelectorAll(".tab").forEach(el => {
    if (!el.onclick) return;
  });
}
</script>
